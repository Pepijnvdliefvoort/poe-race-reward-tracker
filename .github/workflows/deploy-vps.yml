# SSH to VPS and runs deploy/deploy_on_vps.sh (pull, deps, systemd, restart).
# Dashboard service must target server/server.py (not web/server.py).
name: Deploy to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets['DISCORD_WEBHOOK_URL'] }}
    steps:
      - name: Run deploy script over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DISCORD_WEBHOOK_URL
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/poe-market-flips
            bash deploy/deploy_on_vps.sh
