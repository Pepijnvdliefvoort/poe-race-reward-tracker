<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoE Race Rewards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/filters.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <link rel="stylesheet" href="./css/cards.css" />
    <link rel="stylesheet" href="./css/footer.css" />
    <link rel="stylesheet" href="./css/mobile.css" />
    <link rel="stylesheet" href="./css/desktop.css" />
    <link rel="apple-touch-icon" href="./assets/icons/FairgravesTricorneAlt.png" />
    <link rel="icon" type="image/png" href="./assets/icons/FairgravesTricorneAlt.png" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script type="module" src="./js/app.js" defer></script>
  </head>
  <body>
    <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

    <header class="topbar">
      <div>
        <p class="eyebrow">Live Dashboard</p>
        <h1>PoE Race Rewards</h1>
      </div>
      <div class="topbar-right">
        <div class="topbar-actions">
          <button
            id="filtersMenuBtn"
            class="filters-menu-btn"
            title="Open filters"
            aria-label="Open filters and sorting options"
            aria-controls="filtersOverlay"
            aria-expanded="false"
          >
            ☰
          </button>
          <button id="themeToggle" class="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
            <span class="theme-icon">🌙</span>
          </button>
        </div>
        <div class="meta" id="meta">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">Connecting...</span>
        </div>
        <div id="overview"></div>
      </div>
    </header>

    <main>
      <div class="search-row">
        <div class="filter-group main-search-group">
          <label for="searchInput">Search</label>
          <div class="search-input-wrap">
            <input type="text" id="searchInput" placeholder="Filter by name..." enterkeyhint="done" />
            <button type="button" id="searchClearBtn" class="search-clear-btn" aria-label="Clear search" title="Clear search">
              &times;
            </button>
          </div>
        </div>
      </div>
      <section class="cards" id="cards"></section>
    </main>

    <div id="filtersOverlay" class="filters-overlay" aria-hidden="true">
      <aside class="filters-drawer" role="dialog" aria-modal="true" aria-labelledby="filtersDrawerTitle">
        <div class="filters-drawer-header">
          <button id="filtersCloseBtn" class="filters-drawer-close" aria-label="Close filters">&times;</button>
          <h2 id="filtersDrawerTitle">Filters &amp; Sorting</h2>
        </div>
        <div class="filters-panel">
          <div class="filter-group">
            <label for="priceSort">Price</label>
            <select id="priceSort">
              <option value="">None</option>
              <option value="asc">Lowest First</option>
              <option value="desc">Highest First</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="trendSort">Trend</label>
            <select id="trendSort">
              <option value="">None</option>
              <option value="highest">Highest Trend</option>
              <option value="lowest">Lowest Trend</option>
            </select>
          </div>
          <div class="filter-group filter-group-checkbox">
            <label for="favoritesOnly">Favorites</label>
            <label class="checkbox-row" for="favoritesOnly">
              <input type="checkbox" id="favoritesOnly" />
              Favorites only
            </label>
          </div>
          <div class="filter-group filter-group-range">
            <div class="range-label-row">
              <span>Price Range</span>
              <span class="range-values">
                <input type="number" id="priceRangeMinLabel" class="range-num-input" min="0" max="100" step="1" value="0" />
                <span class="range-sep">&ndash;</span>
                <input type="number" id="priceRangeMaxLabel" class="range-num-input" min="0" max="100" step="1" value="100" /><span class="range-at-cap" id="rangeAtCap">+</span>
                <span class="range-unit">mirror(s)</span>
              </span>
            </div>
            <div class="range-control">
              <div class="range-slider-wrap">
                <div class="range-bg">
                  <div class="range-fill" id="rangeFill"></div>
                </div>
                <input type="range" id="priceRangeMin" min="0" max="100" step="1" value="0" />
                <input type="range" id="priceRangeMax" min="0" max="100" step="1" value="100" />
              </div>
            </div>
          </div>
          <button id="resetFiltersBtn" class="reset-filters-btn" title="Clear all filters">Reset Filters</button>
          <button id="applyFiltersBtn" class="apply-filters-btn" title="Apply filters">Apply</button>
        </div>
      </aside>
    </div>

    <footer class="site-footer">
      <p>
        &copy; 2026. Made by
        <a href="https://www.pathofexile.com/account/view-profile/iNeoxiz-3422" target="_blank" rel="noopener noreferrer">iNeoxiz</a>.
      </p>
    </footer>    
  </body>
</html>
